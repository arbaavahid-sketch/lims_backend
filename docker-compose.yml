# استقرار SENAITE LIMS — ساخته‌شده از سورس فورک خودمان (submodule: senaite.core)
# اجرا:  docker compose up -d --build
# رابط:  http://localhost:8080/senaite
services:
  senaite:
    build: .
    image: lims/senaite-fa:latest
    container_name: senaite
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - senaite_data:/data

volumes:
  senaite_data:
    # این volume از قبل ساخته شده و سایت و داده‌ها داخل آن است؛
    # با external، docker compose همان را استفاده می‌کند (نه یک volume جدید).
    external: true
    name: senaite_data
