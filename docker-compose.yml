# استقرار SENAITE LIMS
# اجرا:  docker compose up -d
# رابط:  http://localhost:8080/senaite  (ورود اولیه: admin / admin — حتماً عوضش کنید)
services:
  senaite:
    image: senaite/senaite:2.x
    container_name: senaite
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - senaite_data:/data
      # ترجمه‌های فارسی ما روی ترجمه‌های داخل ایمیج سوار می‌شوند
      # (بدون :ro — چون entrypoint کانتینر موقع بوت chown می‌زند و روی mount فقط-خواندنی crash می‌کند)
      - ./translations/fa:/home/senaite/senaitelims/src/senaite.core/src/senaite/core/locales/fa
      - ./translations/fa:/home/senaite/senaitelims/src/senaite.core/src/senaite/core/locales/fa_IR

volumes:
  senaite_data:
    # این volume از قبل ساخته شده و سایت و داده‌ها داخل آن است؛
    # با external، docker compose همان را استفاده می‌کند (نه یک volume جدید).
    external: true
    name: senaite_data
